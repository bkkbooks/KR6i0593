body:
  text: 三具足經優波提舍翻譯之記一卷施戒聞三備攝眾行是以如來說名具足法門深邃淺識未窺天親菩薩慈心開示唯顯義弗釋章句是故名為憂波提舍昔出中國今現魏都三藏法師毘目智仙婆羅門人瞿曇流支愛敬法人沙門曇林於鄴城內在金華寺興和三年歲次辛酉月建在戍朔次庚午十三日譯千百十言驃騎大將軍開府儀同三司御史中尉渤海高仲密啟請供養守護流通
